# ==========================================
# Configuración de Nginx para el Servidor
# CIA SERVICIOS
# ==========================================
#
# INSTRUCCIONES:
# 1. Copia este archivo a: /etc/nginx/sites-available/cia-servicios
# 2. Reemplaza "tudominio.com.mx" con tu dominio real
# 3. Ejecuta: ln -s /etc/nginx/sites-available/cia-servicios /etc/nginx/sites-enabled/
# 4. Ejecuta: nginx -t && systemctl reload nginx
# 5. Ejecuta: certbot --nginx -d tudominio.com.mx -d www.tudominio.com.mx
#
# ==========================================

# Redirigir HTTP a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tudominio.com.mx www.tudominio.com.mx;
    
    # Redirigir todo el tráfico HTTP a HTTPS
    return 301 https://$server_name$request_uri;
}

# Servidor HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tudominio.com.mx www.tudominio.com.mx;

    # ========== SSL (Certbot los configurará automáticamente) ==========
    # ssl_certificate /etc/letsencrypt/live/tudominio.com.mx/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tudominio.com.mx/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ========== Seguridad ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========== Logs ==========
    access_log /var/log/nginx/cia-servicios.access.log;
    error_log /var/log/nginx/cia-servicios.error.log;

    # ========== Tamaño máximo de archivos ==========
    client_max_body_size 50M;

    # ========== Frontend (React) ==========
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # ========== Backend API (FastAPI) ==========
    location /api {
        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # ========== WebSocket (si lo necesitas) ==========
    location /ws {
        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # ========== Archivos estáticos de tutoriales ==========
    location /tutoriales {
        alias /opt/cia-servicios/frontend/public/tutoriales;
        try_files $uri $uri/ =404;
    }

    # ========== Health check ==========
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
